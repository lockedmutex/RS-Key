# Scheduled deep checks — the slow adversarial suites that are deliberately
# not part of the merge gate (docs/testing.md):
#   miri — fuzz/tests/miri.rs: every fuzz target's logic under Miri's UB
#          checker. MIRIFLAGS policy comes from the .#fuzz dev shell.
#   fuzz — a timed libFuzzer pass over every cargo-fuzz target. The corpus
#          is carried between runs via the actions cache, so coverage
#          accumulates week over week; crash artifacts are uploaded.
#   kani — the #[kani::proof] bounded model-checking harnesses (docs/
#          testing.md). Kani is not in nixpkgs and its setup downloads a
#          prebuilt CBMC bundle, so this one job is rustup-based, not nix.
#   repro — `nix build .#firmware` twice (`--rebuild` diffs every output
#          byte): proves the hermetic image is bit-reproducible and publishes
#          the canonical sha256 for this flake.lock (docs/build.md).
#
# Runs weekly, on demand (workflow_dispatch, with a per-target time knob),
# and self-tests on any push that edits this file. Local equivalents:
#   nix develop .#fuzz -c cargo miri test --manifest-path fuzz/Cargo.toml
#   nix develop .#fuzz -c cargo fuzz run <target> -- -max_total_time=120
#   cargo kani -p rsk-sdk -p rsk-fs -p rsk-rsa-asm -p rsk-crypto -p rsk-rescue -p rsk-openpgp  (cargo install kani-verifier)

name: deep-checks

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: seconds of fuzzing per target
        default: "120"
  push:
    branches: [main]
    paths:
      [".github/workflows/deep-checks.yml", "nix/devshells.nix", "nix/firmware.nix"]

permissions:
  contents: read

concurrency:
  group: deep-checks
  cancel-in-progress: true

jobs:
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-fuzz-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-fuzz-${{ runner.os }}-
            nix-${{ runner.os }}-

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: miri-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.lock', 'flake.lock') }}
          restore-keys: miri-${{ runner.os }}-

      - name: miri — every fuzz target's logic under the UB checker
        run: nix develop .#fuzz -c cargo miri test --manifest-path fuzz/Cargo.toml

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-fuzz-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-fuzz-${{ runner.os }}-
            nix-${{ runner.os }}-

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.lock', 'flake.lock') }}
          restore-keys: fuzz-${{ runner.os }}-

      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-

      - name: build every fuzz target
        run: nix develop .#fuzz -c cargo fuzz build

      - name: fuzz every target
        run: |
          nix develop .#fuzz -c bash -euo pipefail -c '
            failed=""
            for t in $(cargo fuzz list); do
              echo "::group::${t} (${FUZZ_SECONDS}s)"
              if ! cargo fuzz run "$t" -- -max_total_time="$FUZZ_SECONDS" -print_final_stats=1; then
                failed="$failed $t"
              fi
              echo "::endgroup::"
            done
            if [ -n "$failed" ]; then
              echo "::error::crashing targets:$failed"
              exit 1
            fi
          '
        env:
          FUZZ_SECONDS: ${{ inputs.fuzz_seconds || '120' }}

      - name: upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ github.run_id }}
          path: fuzz/artifacts/
          if-no-files-found: ignore

      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: always()
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}

  kani:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KANI_VERSION: "0.67.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.kani
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.cargo/registry
          key: kani-${{ runner.os }}-${{ env.KANI_VERSION }}

      - name: install kani (rustup-based — not packaged in nixpkgs)
        run: |
          command -v cargo-kani >/dev/null || cargo install --locked kani-verifier --version "$KANI_VERSION"
          cargo kani setup

      - name: prove every harness
        run: cargo kani -p rsk-sdk -p rsk-fs -p rsk-rsa-asm -p rsk-crypto -p rsk-rescue -p rsk-openpgp
  repro:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: build the firmware image
        run: nix build .#firmware -o result-repro

      - name: rebuild and require bit-identical outputs
        run: nix build .#firmware --rebuild

      - name: publish the reproducible hashes
        run: |
          {
            echo "### Reproducible firmware (this flake.lock, x86_64-linux)"
            echo '```'
            (cd result-repro && sha256sum firmware.uf2 firmware.elf)
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
