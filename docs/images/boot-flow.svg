<svg viewBox="0 0 780 552" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title id="ttl">RS-Key boot sequence</title>
  <desc id="dsc">Boot flows top to bottom in three phases. Bootrom verifies the signed image. Then the firmware provisions and recovers all persistent state — read OTP keys, mount the KV store, load the phy record, seed the TRNG, run the seal migrations and at-rest scrub — all before the USB pull-up. Only then does build() attach the bus, spawn the transport tasks, and let the worker dispatch applets.</desc>
  <defs>
    <style>
      .h1{font-size:23px;font-weight:700;fill:#2B2723}
      .sub{font-size:12.5px;fill:#948A7F}
      .lg{font-size:11px;fill:#6B645C}
      .pill{font-size:10.5px;font-weight:700;fill:#fff;letter-spacing:.4px}
      .ptag{font-size:11px;fill:#948A7F}
      .num{font-size:11px;font-weight:700;fill:#fff}
      .step{font-size:12px;fill:#2B2723}
      .mono{font-family:'SF Mono','Roboto Mono',ui-monospace,monospace;fill:#A9764F;font-weight:700}
      .dvlab{font-size:11px;font-weight:700;fill:#fff}
      .foot{font-size:10.5px;fill:#ADA398}
    </style>
  </defs>
  <rect x="6" y="6" width="768" height="540" rx="16" fill="#FBFAF8" stroke="#E4DED5" stroke-width="1.5"/>

  <text class="h1" x="34" y="46">Boot sequence</text>
  <text class="sub" x="34" y="68">power-on → provision (before USB attach) → serve · single RP2350 core</text>

  <!-- legend -->
  <rect x="470" y="34" width="13" height="13" rx="3" fill="#3E3A36"/>
  <text class="lg" x="490" y="45">bootrom</text>
  <rect x="558" y="34" width="13" height="13" rx="3" fill="#C0562B"/>
  <text class="lg" x="578" y="45">provision</text>
  <rect x="652" y="34" width="13" height="13" rx="3" fill="#2F7E75"/>
  <text class="lg" x="672" y="45">serve</text>

  <!-- connectors -->
  <g stroke-width="2.5" fill="none">
    <path d="M66 204 V 330" stroke="#C0562B"/>
    <path d="M66 432 V 468" stroke="#2F7E75"/>
  </g>

  <!-- PHASE: bootrom -->
  <rect x="40" y="94" width="104" height="20" rx="6" fill="#3E3A36"/>
  <text class="pill" x="52" y="108">BOOTROM</text>
  <text class="ptag" x="156" y="108">secure boot</text>
  <circle cx="66" cy="132" r="12" fill="#3E3A36"/>
  <text class="num" x="66" y="136" text-anchor="middle">1</text>
  <text class="step" x="88" y="136">Bootrom verifies the signed <tspan class="mono">IMAGE_DEF</tspan> against the OTP boot key, then executes</text>

  <!-- PHASE: provision -->
  <rect x="40" y="152" width="176" height="20" rx="6" fill="#C0562B"/>
  <text class="pill" x="52" y="166">PROVISION &amp; RECOVER</text>
  <text class="ptag" x="228" y="166">runs to completion before the USB pull-up</text>

  <circle cx="66" cy="192" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="196" text-anchor="middle">2</text>
  <text class="step" x="88" y="196">embassy init · clocks settle (XOSC)</text>

  <circle cx="66" cy="222" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="226" text-anchor="middle">3</text>
  <text class="step" x="88" y="226">chip id → serial · read OTP keys (MKEK, DEVK) · lock the key page</text>

  <circle cx="66" cy="252" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="256" text-anchor="middle">4</text>
  <text class="step" x="88" y="256">mount KV store · <tspan class="mono">scan()</tspan> recovers counters + resident creds</text>

  <circle cx="66" cy="282" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="286" text-anchor="middle">5</text>
  <text class="step" x="88" y="286">load <tspan class="mono">EF_PHY</tspan> → USB identity, interface mask, presence timeout</text>

  <circle cx="66" cy="312" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="316" text-anchor="middle">6</text>
  <text class="step" x="88" y="316">seed TRNG → DRBG (sample_count <tspan class="mono">1000</tspan> → ~1.5 s, health-check safe)</text>

  <circle cx="66" cy="342" r="12" fill="#C0562B"/>
  <text class="num" x="66" y="346" text-anchor="middle">7</text>
  <text class="step" x="88" y="346">seal migrations → OTP-root re-key · ensure seed · OpenPGP DEK · at-rest scrub · LED</text>

  <!-- pull-up divider -->
  <line x1="40" y1="372" x2="736" y2="372" stroke="#3E3A36" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="238" y="362" width="300" height="20" rx="10" fill="#3E3A36"/>
  <text class="dvlab" x="388" y="376" text-anchor="middle">USB pull-up · host enumeration starts</text>

  <!-- PHASE: serve -->
  <rect x="40" y="390" width="140" height="20" rx="6" fill="#2F7E75"/>
  <text class="pill" x="52" y="404">ATTACH &amp; SERVE</text>
  <text class="ptag" x="192" y="404">no blocking work between build() and the spawn</text>

  <circle cx="66" cy="432" r="12" fill="#2F7E75"/>
  <text class="num" x="66" y="436" text-anchor="middle">8</text>
  <text class="step" x="88" y="436"><tspan class="mono">build()</tspan> attaches the bus → spawn <tspan class="mono">usb_task</tspan> immediately</text>

  <circle cx="66" cy="462" r="12" fill="#2F7E75"/>
  <text class="num" x="66" y="466" text-anchor="middle">9</text>
  <text class="step" x="88" y="466">transports go live on the interrupt executor: CTAPHID · CCID · keyboard</text>

  <circle cx="66" cy="492" r="12" fill="#2F7E75"/>
  <text class="num" x="66" y="496" text-anchor="middle">10</text>
  <text class="step" x="88" y="496">worker dispatches applets · core1 parks in WFE (wakes only for RSA keygen)</text>

  <text class="foot" x="34" y="528">Provisioning is deliberately pre-attach: the pull-up starts enumeration, so a mute device would time out. Source: firmware/src/main.rs</text>
</svg>
